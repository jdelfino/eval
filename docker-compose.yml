version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: eval
      POSTGRES_USER: eval
      POSTGRES_PASSWORD: eval_local_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eval -d eval"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  centrifugo:
    image: centrifugo/centrifugo:v5
    command: centrifugo -c config.json
    ports:
      - "8000:8000"
    volumes:
      - ./centrifugo.json:/centrifugo/config.json:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  executor:
    build:
      context: .
      dockerfile: executor/Dockerfile
    ports:
      - "8081:8081"
    environment:
      PORT: "8081"
      ENVIRONMENT: local
      LOG_LEVEL: debug
      NSJAIL_PATH: /usr/bin/nsjail
      PYTHON_PATH: /usr/bin/python3
      DEFAULT_TIMEOUT_MS: "10000"
    privileged: true
    tmpfs:
      - /tmp:exec,size=256m
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8081/healthz\")'"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
