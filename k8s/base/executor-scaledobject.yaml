apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: executor-scaler
spec:
  scaleTargetRef:
    name: executor
  minReplicaCount: 1
  maxReplicaCount: 10
  cooldownPeriod: 60
  pollingInterval: 15
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus-server.monitoring.svc.cluster.local
        metricName: executor_active_executions
        query: sum(executor_active_executions)
        threshold: "3"
