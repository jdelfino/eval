apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: executor-scaler
spec:
  scaleTargetRef:
    name: executor
  # Scale to zero when no executions are pending. The GMP query frontend
  # (gmp-frontend.yaml) exposes Prometheus-compatible metrics from GMP.
  minReplicaCount: 0
  maxReplicaCount: 10
  cooldownPeriod: 60
  pollingInterval: 15
  triggers:
    - type: prometheus
      metadata:
        # GMP query frontend deployed via gmp-frontend.yaml in gmp-system namespace.
        serverAddress: http://frontend.gmp-system.svc:9090
        metricName: executor_active_executions
        query: sum(executor_active_executions)
        threshold: "3"
