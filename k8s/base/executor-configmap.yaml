apiVersion: v1
kind: ConfigMap
metadata:
  name: executor-config
data:
  PORT: "8081"
  ENVIRONMENT: "production"
  LOG_LEVEL: "info"
  NSJAIL_PATH: "/usr/bin/nsjail"
  PYTHON_PATH: "/usr/bin/python3"
  DEFAULT_TIMEOUT_MS: "10000"
  REDIS_HOST: "redis.default.svc.cluster.local"
  REDIS_PORT: "6379"
