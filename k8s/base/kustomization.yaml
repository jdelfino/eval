apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml
  - pod-monitoring.yaml
  - executor-deployment.yaml
  - executor-service.yaml
  - executor-configmap.yaml
  - executor-scaledobject.yaml
  - executor-networkpolicy.yaml
  - redis-deployment.yaml
  - redis-service.yaml
  - frontend-deployment.yaml
  - frontend-service.yaml
  # frontend-configmap.yaml is managed by Terraform (contains Identity Platform keys)
  - serviceaccount.yaml
  - ingress.yaml
  - centrifugo-deployment.yaml
  - centrifugo-service.yaml
  - centrifugo-backend-config.yaml
  - frontend-config.yaml
  - managed-certificate.yaml

images:
  - name: go-api
    newName: go-api
  - name: executor
    newName: executor
  - name: frontend
    newName: frontend
  - name: centrifugo/centrifugo
    newName: centrifugo/centrifugo
