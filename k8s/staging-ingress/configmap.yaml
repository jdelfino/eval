apiVersion: v1
kind: ConfigMap
metadata:
  name: staging-ingress-proxy-config
data:
  nginx.conf: |
    events {}

    http {
      server {
        listen 8080;

        # Health check (independent of staging backend availability)
        location = /healthz {
          return 200 "ok";
          add_header Content-Type text/plain;
        }

        # WebSocket proxy to staging centrifugo
        location = /connection/websocket {
          proxy_pass http://centrifugo.staging.svc.cluster.local:8000;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_set_header Host $host;
          proxy_read_timeout 3600s;
          proxy_send_timeout 3600s;
        }

        # API proxy to staging go-api
        location /api/ {
          proxy_pass http://go-api.staging.svc.cluster.local:80;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Default backend — staging frontend
        location / {
          proxy_pass http://frontend.staging.svc.cluster.local:80;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
      }
    }
