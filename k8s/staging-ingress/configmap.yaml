apiVersion: v1
kind: ConfigMap
metadata:
  name: staging-ingress-proxy-config
data:
  nginx.conf: |
    events {}

    http {
      # Use kube-dns for dynamic upstream resolution.
      # Without this, nginx caches DNS from startup and never re-resolves,
      # causing 504s when backend pods get new IPs during rolling updates.
      resolver kube-dns.kube-system.svc.cluster.local valid=5s;

      server {
        listen 8080;

        # Health check (independent of staging backend availability)
        location = /healthz {
          return 200 "ok";
          add_header Content-Type text/plain;
        }

        # WebSocket proxy to staging centrifugo
        location = /connection/websocket {
          set $upstream_centrifugo http://centrifugo.staging.svc.cluster.local:8000;
          proxy_pass $upstream_centrifugo;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_set_header Host $host;
          proxy_read_timeout 3600s;
          proxy_send_timeout 3600s;
        }

        # API proxy to staging go-api
        location /api/ {
          set $upstream_api http://go-api.staging.svc.cluster.local:80;
          proxy_pass $upstream_api;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Default backend — staging frontend
        location / {
          set $upstream_frontend http://frontend.staging.svc.cluster.local:80;
          proxy_pass $upstream_frontend;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
      }
    }
