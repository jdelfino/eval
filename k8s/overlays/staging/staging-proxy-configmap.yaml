apiVersion: v1
kind: ConfigMap
metadata:
  name: staging-proxy-config
  namespace: staging
data:
  nginx.conf: |
    events {}

    http {
      server {
        listen 8080;

        # WebSocket proxy to centrifugo
        location = /connection/websocket {
          proxy_pass http://centrifugo:8000;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_set_header Host $host;
          proxy_read_timeout 3600s;
          proxy_send_timeout 3600s;
        }

        # API proxy to go-api
        location /api/ {
          proxy_pass http://go-api:80;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Executor proxy — staging only (not exposed via production ingress)
        location /execute {
          proxy_pass http://executor:8081;
        }

        location /healthz/executor {
          proxy_pass http://executor:8081/healthz;
        }

        # Default backend — frontend
        location / {
          proxy_pass http://frontend:80;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
      }
    }
