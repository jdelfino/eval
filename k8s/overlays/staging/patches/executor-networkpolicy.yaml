apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: executor-allow-api-only
spec:
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: go-api
        - podSelector:
            matchLabels:
              app: executor-validate
      ports:
        - protocol: TCP
          port: 8081
