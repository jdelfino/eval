apiVersion: apps/v1
kind: Deployment
metadata:
  name: staging-proxy
  namespace: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: staging-proxy
  template:
    metadata:
      labels:
        app: staging-proxy
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 32Mi
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
      volumes:
        - name: nginx-config
          configMap:
            name: staging-proxy-config
