# Google Managed Prometheus (GMP) query frontend.
# Exposes a Prometheus-compatible query API over collected GMP metrics.
# Required by KEDA's prometheus trigger in executor-scaledobject.yaml.
# Reference: https://cloud.google.com/stackdriver/docs/managed-prometheus/query
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: gmp-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      automountServiceAccountToken: true
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/arch
                    operator: In
                    values:
                      - arm64
                      - amd64
                  - key: kubernetes.io/os
                    operator: In
                    values:
                      - linux
      containers:
        - name: frontend
          image: gke.gcr.io/prometheus-engine/frontend:v0.14.1-gke.0
          args:
            - --web.listen-address=:9090
          ports:
            - name: web
              containerPort: 9090
          readinessProbe:
            httpGet:
              path: /-/ready
              port: web
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: web
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
      tolerations:
        - key: components.gke.io/gke-managed-components
          operator: Exists
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: gmp-system
spec:
  selector:
    app: frontend
  ports:
    - name: web
      port: 9090
      targetPort: web
  clusterIP: None
