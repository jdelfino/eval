pre-commit:
  parallel: true
  commands:
    bd-sync:
      run: bd sync
    lint-api:
      glob: "go-backend/**/*.go"
      run: make lint-api
    lint-executor:
      glob: "executor/**/*.go"
      run: make lint-executor
    lint-frontend:
      glob: "frontend/**/*.{ts,tsx,js,jsx}"
      run: make lint-frontend
    typecheck-frontend:
      glob: "frontend/**/*.{ts,tsx,js,jsx}"
      run: make typecheck-frontend
    check-api-imports:
      glob: "frontend/**/*.{ts,tsx,js,jsx}"
      run: make check-api-imports
    gitleaks:
      run: gitleaks git --pre-commit --staged --no-banner

prepare-commit-msg:
  commands:
    bd-trailers:
      run: bd trailers {1}

pre-push:
  parallel: true
  commands:
    bd-push:
      run: bd push
    test-api:
      glob: "go-backend/**/*.go"
      run: make test-api
    test-executor:
      glob: "executor/**/*.{go,py}"
      run: make test-executor
    test-frontend:
      glob: "frontend/**/*.{ts,tsx,js,jsx}"
      run: make test-frontend
    check-contract-coverage:
      glob: "go-backend/**/*.go"
      run: make check-contract-coverage

post-checkout:
  commands:
    bd-hooks:
      run: bd hooks

post-merge:
  commands:
    bd-hooks:
      run: bd hooks
