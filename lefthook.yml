pre-commit:
  parallel: true
  commands:
    bd-pre-commit:
      run: TERM=dumb bd hooks run pre-commit
    lint-api:
      glob: "go-backend/{,**/}*.go"
      run: make lint-api
    lint-executor:
      glob: "executor/{,**/}*.go"
      run: make lint-executor
    lint-frontend:
      glob: "frontend/{,**/}*.{ts,tsx,js,jsx}"
      run: make lint-frontend
    typecheck-frontend:
      glob: "frontend/{,**/}*.{ts,tsx,js,jsx}"
      run: make typecheck-frontend
    check-api-imports:
      glob: "frontend/{,**/}*.{ts,tsx,js,jsx}"
      run: make check-api-imports
    gitleaks:
      run: gitleaks git --pre-commit --staged --no-banner

prepare-commit-msg:
  commands:
    bd-trailers:
      run: TERM=dumb bd hooks run prepare-commit-msg {1}

pre-push:
  parallel: true
  commands:
    bd-push:
      run: TERM=dumb bd hooks run pre-push {1} {2}
    test-api:
      glob: "go-backend/{,**/}*.go"
      run: make test-api
    test-executor:
      glob: "executor/{,**/}*.{go,py}"
      run: make test-executor
    test-frontend:
      glob: "frontend/{,**/}*.{ts,tsx,js,jsx}"
      run: make test-frontend
    check-contract-coverage:
      glob: "{go-backend/{,**/}*.go,frontend/{,**/}*.{ts,tsx}}"
      run: make check-contract-coverage

post-checkout:
  commands:
    bd-hooks:
      run: TERM=dumb bd hooks run post-checkout {1} {2} {3}

post-merge:
  commands:
    bd-hooks:
      run: TERM=dumb bd hooks run post-merge {1}
