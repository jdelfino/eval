name: Executor

on:
  push:
    branches: [main]
    paths:
      - 'executor/**'
      - 'pkg/**'
      - '.github/workflows/executor.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'executor/**'
      - 'pkg/**'
  workflow_dispatch:

env:
  GO_VERSION: '1.24'
  REGISTRY: us-east1-docker.pkg.dev/eval-prod-485520/go-api
  IMAGE_NAME: executor

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: executor/go.sum
      - name: Build
        run: go build ./...
        working-directory: executor
      - name: Test
        run: go test -v -race ./...
        working-directory: executor

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: executor/go.sum
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.8.0
          working-directory: executor
          args: --timeout=3m

  integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: executor/go.sum
      - name: Build executor
        run: go build -o ./tmp/executor ./cmd/executor
        working-directory: executor
      - name: Start executor
        run: |
          executor/tmp/executor &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8081/healthz > /dev/null 2>&1; then break; fi
            sleep 1
          done
          curl -sf http://localhost:8081/healthz || { echo "Executor not ready"; exit 1; }
        env:
          DISABLE_SANDBOX: "true"
          PYTHON_PATH: /usr/bin/python3
      - name: Run integration tests
        env:
          EXECUTOR_TEST_URL: http://localhost:8081
          EXECUTOR_SKIP_SANDBOX_TESTS: "1"
        run: go test -v -race -count=1 ./...
        working-directory: executor

  build-push:
    needs: [test, lint, integration-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - run: gcloud auth configure-docker us-east1-docker.pkg.dev
      - run: |
          docker build -f executor/Dockerfile -t $REGISTRY/$IMAGE_NAME:${{ github.sha }} -t $REGISTRY/$IMAGE_NAME:latest .
          docker push $REGISTRY/$IMAGE_NAME:${{ github.sha }}
          docker push $REGISTRY/$IMAGE_NAME:latest
