name: Build Test Runner Base

on:
  push:
    branches: [main]
    paths:
      - frontend/package-lock.json
      - docker/test-runner/Dockerfile.base
  workflow_dispatch:

env:
  REGISTRY: us-east1-docker.pkg.dev/eval-prod-485520/go-api

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - run: gcloud auth configure-docker us-east1-docker.pkg.dev
      - run: |
          docker build -f docker/test-runner/Dockerfile.base \
            -t $REGISTRY/test-runner-base:latest \
            .
          docker push $REGISTRY/test-runner-base:latest
