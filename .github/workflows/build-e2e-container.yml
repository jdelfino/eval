name: Build E2E Container

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/eval-e2e

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract Playwright version
        id: pw-version
        run: |
          PW_VERSION=$(node -e "
            const pkg = require('./frontend/package.json');
            console.log(pkg.devDependencies['@playwright/test'].replace(/^[\^~]/, ''));
          ")
          echo "version=$PW_VERSION" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .github/e2e-container
          push: true
          build-args: PLAYWRIGHT_VERSION=v${{ steps.pw-version.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ steps.pw-version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
