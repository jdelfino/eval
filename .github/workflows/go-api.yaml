name: Go API

on:
  push:
    branches: [main]
    paths:
      - 'go-backend/**'
      - '.github/workflows/go-api.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'go-backend/**'
  workflow_dispatch:

env:
  GO_VERSION: '1.24'
  REGISTRY: us-east1-docker.pkg.dev/eval-prod-485520/go-api
  IMAGE_NAME: go-api

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go-backend/go.sum
      - name: Build
        run: go build ./...
        working-directory: go-backend
      - name: Test
        run: go test -v -race ./...
        working-directory: go-backend

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go-backend/go.sum
      - uses: golangci/golangci-lint-action@v4
        with:
          working-directory: go-backend
          args: --timeout=3m

  integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go-backend/go.sum
      - name: Start dependencies
        run: docker compose up -d postgres --wait
      - name: Run integration tests
        env:
          DATABASE_URL: postgres://eval:eval_local_password@localhost:5432/eval?sslmode=disable
        run: go test -v -race ./...
        working-directory: go-backend
      - name: Stop dependencies
        if: always()
        run: docker compose down

  build-push:
    needs: [test, lint, integration-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - run: gcloud auth configure-docker us-east1-docker.pkg.dev
      - run: |
          docker build -t $REGISTRY/$IMAGE_NAME:${{ github.sha }} go-backend/
          docker push $REGISTRY/$IMAGE_NAME:${{ github.sha }}

  deploy:
    needs: [build-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Deploy via Cloud Build
        run: |
          gcloud builds submit --no-source \
            --config=go-backend/cloudbuild.yaml \
            --substitutions=_IMAGE=$REGISTRY/$IMAGE_NAME:${{ github.sha }},_GKE_CLUSTER=${{ secrets.GKE_CLUSTER }},_GKE_LOCATION=${{ secrets.GKE_LOCATION }} \
            --region=${{ secrets.GKE_LOCATION }}
