name: Go API

on:
  push:
    branches: [main]
    paths:
      - 'go-backend/**'
      - 'k8s/**'
      - 'migrations/**'
      - '.github/workflows/go-api.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'go-backend/**'
      - 'k8s/**'
      - 'migrations/**'
  workflow_dispatch:

env:
  GO_VERSION: '1.24'
  REGISTRY: us-east1-docker.pkg.dev/eval-prod-485520/go-api
  IMAGE_NAME: go-api

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go-backend/go.sum
      - name: Build
        run: go build ./...
        working-directory: go-backend
      - name: Test
        run: go test -v -race ./...
        working-directory: go-backend

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go-backend/go.sum
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.8.0
          working-directory: go-backend
          args: --timeout=3m

  validate-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate kustomize build
        run: kustomize build k8s/base > /dev/null

  integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go-backend/go.sum
      - name: Start dependencies
        run: docker compose up -d postgres --wait
      - name: Apply migrations
        run: |
          for f in migrations/*.up.sql; do
            psql "postgres://eval:eval_local_password@localhost:5432/eval?sslmode=disable" -f "$f"
          done
      - name: Run integration tests
        env:
          DATABASE_URL: postgres://eval:eval_local_password@localhost:5432/eval?sslmode=disable
        run: go test -v -race ./...
        working-directory: go-backend
      - name: Stop dependencies
        if: always()
        run: docker compose down

  build-push:
    needs: [test, lint, integration-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - run: gcloud auth configure-docker us-east1-docker.pkg.dev
      - run: |
          docker build -f go-backend/Dockerfile -t $REGISTRY/$IMAGE_NAME:${{ github.sha }} .
          docker push $REGISTRY/$IMAGE_NAME:${{ github.sha }}
