name: Go API

on:
  push:
    branches: [main]
    paths:
      - 'go-backend/**'
      - '.github/workflows/go-api.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'go-backend/**'

env:
  GO_VERSION: '1.24'
  REGISTRY: us-east1-docker.pkg.dev/eval-prod-485520/go-api
  IMAGE_NAME: go-api

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build
        run: go build ./...
        working-directory: go-backend
      - name: Test
        run: go test -v -race ./...
        working-directory: go-backend

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: golangci/golangci-lint-action@v4
        with:
          working-directory: go-backend

  build-push:
    needs: [test, lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - run: gcloud auth configure-docker us-east1-docker.pkg.dev
      - run: |
          docker build -t $REGISTRY/$IMAGE_NAME:${{ github.sha }} go-backend/
          docker push $REGISTRY/$IMAGE_NAME:${{ github.sha }}

  deploy:
    needs: [build-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER }}
          location: ${{ secrets.GKE_LOCATION }}
      - run: |
          kubectl set image deployment/go-api \
            go-api=$REGISTRY/$IMAGE_NAME:${{ github.sha }}
