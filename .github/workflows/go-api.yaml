name: Go API

on:
  pull_request:
    branches: [main]
    paths:
      - 'go-backend/**'
      - 'k8s/**'
      - 'migrations/**'
      - 'scripts/lint-migrations.sh'
      - 'scripts/test-lint-migrations.sh'
  workflow_call:
  workflow_dispatch:

env:
  GO_VERSION: '1.24'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go-backend/go.sum
      - name: Build
        run: go build ./...
        working-directory: go-backend
      - name: Test
        run: go test -v -race -timeout 5m ./...
        working-directory: go-backend

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go-backend/go.sum
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.8.0
          working-directory: go-backend
          args: --timeout=3m

  validate-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate kustomize build (base)
        run: kustomize build k8s/base > /dev/null
      - name: Validate staging overlay
        run: kustomize build k8s/overlays/staging > /dev/null

  migration-lint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for git diff
      - name: Test lint script
        run: bash scripts/test-lint-migrations.sh
      - name: Check for migration-override label
        id: check-label
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            core.setOutput('skip', labels.includes('migration-override'));
      - name: Lint migrations
        if: steps.check-label.outputs.skip != 'true'
        run: |
          # Get migration files changed in this PR
          CHANGED=$(git diff --name-only origin/main...HEAD -- 'migrations/*.up.sql')
          if [ -z "$CHANGED" ]; then
            echo "No migration files changed"
            exit 0
          fi
          echo "Changed migration files:"
          echo "$CHANGED"
          ./scripts/lint-migrations.sh $CHANGED

  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go-backend/go.sum
      - name: Start dependencies
        run: docker compose up -d postgres centrifugo --wait
      - name: Apply migrations
        run: |
          for f in migrations/*.up.sql; do
            psql "postgres://eval:eval_local_password@localhost:5432/eval?sslmode=disable" -f "$f"
          done
      - name: Run integration tests
        env:
          DATABASE_URL: postgres://eval:eval_local_password@localhost:5432/eval?sslmode=disable
          CENTRIFUGO_URL: http://localhost:8000
          CENTRIFUGO_API_KEY: local-api-key
          CENTRIFUGO_TOKEN_SECRET: local-dev-secret-key-not-for-production
        run: go test -v -race -timeout 5m ./...
        working-directory: go-backend
      - name: Stop dependencies
        if: always()
        run: docker compose down

