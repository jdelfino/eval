name: Deploy (Manual)

on:
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  REGISTRY: us-east1-docker.pkg.dev/eval-prod-485520/go-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      # setup-gcloud@v2 downloads a full ~500MB SDK even though gcloud is
      # pre-installed on the runner. The runner's apt-managed gcloud disables
      # the component manager and the Google Cloud apt source is removed, so
      # we re-add the source and install the plugin directly (~8s vs ~58s).
      - name: Install gke-gcloud-auth-plugin
        run: |
          curl -fsSL https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" | sudo tee /etc/apt/sources.list.d/google-cloud-sdk.list >/dev/null
          sudo apt-get update -o Dir::Etc::sourcelist="sources.list.d/google-cloud-sdk.list" -o Dir::Etc::sourceparts="-" -o APT::Get::List-Cleanup="0" -qq
          sudo apt-get install -y -qq google-cloud-cli-gke-gcloud-auth-plugin
      - name: Get GKE credentials via Connect Gateway
        run: |
          for i in 1 2 3; do
            gcloud container fleet memberships get-credentials ${{ secrets.GKE_CLUSTER }} \
              --project=eval-prod-485520 && break
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
      - name: Deploy
        run: |
          cd k8s/base

          # Manual dispatch — redeploy with current live images.
          API_IMG=$(kubectl get deploy go-api -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "")
          EXE_IMG=$(kubectl get deploy executor -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "")
          FE_IMG=$(kubectl get deploy frontend -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "")

          [ -n "$API_IMG" ] && kustomize edit set image "go-api=$API_IMG"
          [ -n "$EXE_IMG" ] && kustomize edit set image "executor=$EXE_IMG"
          [ -n "$FE_IMG" ] && kustomize edit set image "frontend=$FE_IMG"

          kubectl apply -k .
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/go-api --timeout=120s
          kubectl rollout status deployment/executor --timeout=120s
          kubectl rollout status deployment/frontend --timeout=120s
          kubectl rollout status deployment/centrifugo --timeout=120s
      - name: Wait for ingress
        run: |
          # After pods are ready, the GKE NEG (Network Endpoint Group) can
          # take 30-90s to add the new endpoints to the load balancer.
          # Poll through the external URL to confirm traffic is flowing
          # before running smoke tests.
          url="https://eval.delquillan.com/"
          echo "Waiting for ingress to route traffic to new pods..."
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "$url" 2>/dev/null || echo "000")
            if [[ "$code" =~ ^(200|401|403|404)$ ]]; then
              echo "Ingress ready (HTTP $code after $((i * 5))s)"
              exit 0
            fi
            echo "  Attempt ${i}/60: HTTP ${code}, waiting 5s..."
            sleep 5
          done
          echo "::error::Ingress not ready after 300s"
          exit 1
      - name: Smoke test
        run: ./scripts/smoke-test.sh
        env:
          SMOKE_TEST_URL: https://eval.delquillan.com
          GCP_PROJECT_ID: eval-prod-485520

  notify-failure:
    needs: deploy
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = 'Deploy to production failed';
            const sha = context.sha;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `Manual deploy failed at commit \`${sha.slice(0, 7)}\`.\n\n[View run](${runUrl})`;

            // Update existing open issue or create a new one.
            const { data: issues } = await github.rest.issues.listForRepo({
              ...context.repo,
              state: 'open',
              labels: 'deploy-failure',
            });
            if (issues.length > 0) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: issues[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                ...context.repo,
                title,
                body,
                labels: ['deploy-failure'],
              });
            }
