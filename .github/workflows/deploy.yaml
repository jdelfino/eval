name: Deploy

on:
  workflow_run:
    workflows: ["Go API", "Executor", "Frontend"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: us-east1-docker.pkg.dev/eval-prod-485520/go-api

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin
      - name: Get GKE credentials via Connect Gateway
        run: |
          gcloud container fleet memberships get-credentials ${{ secrets.GKE_CLUSTER }} \
            --project=eval-prod-485520
      - name: Deploy
        run: |
          cd k8s/base

          # Read current live images to preserve across deploys.
          API_IMG=$(kubectl get deploy go-api -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "")
          EXE_IMG=$(kubectl get deploy executor -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "")
          FE_IMG=$(kubectl get deploy frontend -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "")

          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          TRIGGER="${{ github.event.workflow_run.name }}"

          # Override the image for whichever service triggered this deploy.
          # For manual dispatch, redeploy with current live images.
          if [ "$TRIGGER" = "Go API" ]; then
            kustomize edit set image "go-api=$REGISTRY/go-api:$SHA"
            [ -n "$EXE_IMG" ] && kustomize edit set image "executor=$EXE_IMG"
            [ -n "$FE_IMG" ] && kustomize edit set image "frontend=$FE_IMG"
          elif [ "$TRIGGER" = "Executor" ]; then
            kustomize edit set image "executor=$REGISTRY/executor:$SHA"
            [ -n "$API_IMG" ] && kustomize edit set image "go-api=$API_IMG"
            [ -n "$FE_IMG" ] && kustomize edit set image "frontend=$FE_IMG"
          elif [ "$TRIGGER" = "Frontend" ]; then
            kustomize edit set image "frontend=$REGISTRY/frontend:$SHA"
            [ -n "$API_IMG" ] && kustomize edit set image "go-api=$API_IMG"
            [ -n "$EXE_IMG" ] && kustomize edit set image "executor=$EXE_IMG"
          else
            # Manual dispatch — preserve current live images.
            [ -n "$API_IMG" ] && kustomize edit set image "go-api=$API_IMG"
            [ -n "$EXE_IMG" ] && kustomize edit set image "executor=$EXE_IMG"
            [ -n "$FE_IMG" ] && kustomize edit set image "frontend=$FE_IMG"
          fi

          kubectl apply -k .
