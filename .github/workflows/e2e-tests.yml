name: E2E Tests

on:
  push:
    branches: [main]
    paths:
      - 'go-backend/**'
      - 'frontend/**'
      - 'migrations/**'
      - 'scripts/**'
  pull_request:
    branches: [main]
    paths:
      - 'go-backend/**'
      - 'frontend/**'
      - 'migrations/**'
      - 'scripts/**'
  workflow_dispatch:

env:
  GO_VERSION: '1.24'
  NODE_VERSION: '20'
  EXECUTOR_REGISTRY: us-east1-docker.pkg.dev/eval-prod-485520/go-api

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go-backend/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
        working-directory: frontend
      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
        working-directory: frontend

      - name: Build Go API
        run: go build -o ./tmp/server ./cmd/server
        working-directory: go-backend

      # Pull pre-built executor image so run-e2e-tests.sh skips the ~90s
      # Docker build (nsjail from source). Falls back to building locally
      # if the pull fails (e.g., first run before executor workflow has pushed).
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - name: Pre-pull executor image
        run: |
          gcloud auth configure-docker us-east1-docker.pkg.dev --quiet 2>/dev/null || true
          if docker pull $EXECUTOR_REGISTRY/executor:latest 2>/dev/null; then
            docker run -d --name eval-executor-1 \
              -p 8081:8081 --privileged \
              -e PORT=8081 -e ENVIRONMENT=local -e LOG_LEVEL=debug \
              -e NSJAIL_PATH=/usr/bin/nsjail -e PYTHON_PATH=/usr/bin/python3 \
              -e DEFAULT_TIMEOUT_MS=10000 \
              $EXECUTOR_REGISTRY/executor:latest
            for i in $(seq 1 30); do
              curl -sf http://localhost:8081/healthz >/dev/null 2>&1 && break
              sleep 1
            done
            echo "Executor running from pre-built image"
          else
            echo "Pre-built executor not available, will build from source"
          fi

      - name: Run E2E tests
        run: make test-e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14
