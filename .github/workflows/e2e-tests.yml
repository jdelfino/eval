name: E2E Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'go-backend/**'
      - 'frontend/**'
      - 'executor/**'
      - 'pkg/**'
      - 'migrations/**'
      - 'scripts/**'
  workflow_dispatch:

env:
  GO_VERSION: '1.24'
  EXECUTOR_REGISTRY: us-east1-docker.pkg.dev/eval-prod-485520/go-api

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/jdelfino/eval-e2e:v1.57.0
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --privileged
    permissions:
      contents: read
      packages: read
      id-token: write
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      # Git safe.directory needed for Go VCS stamping in container jobs
      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      # Docker compose containers bind to the host, not the job container.
      # Detect the host gateway IP so scripts can connect to postgres/redis/etc.
      - name: Detect Docker host IP
        id: host-ip
        run: |
          # getent is available in the Playwright base image
          GATEWAY=$(getent hosts host.docker.internal 2>/dev/null | awk '{print $1}' || true)
          if [ -z "$GATEWAY" ]; then
            # Fall back to reading the default route from /proc
            GATEWAY=$(awk '$2 == "00000000" {print $3; exit}' /proc/net/route \
              | sed 's/\(..\)/\1\n/g' | tac | while read h; do printf '%d.' "0x$h"; done \
              | sed 's/\.$//')
          fi
          echo "ip=$GATEWAY" >> "$GITHUB_OUTPUT"
          echo "Docker host IP: $GATEWAY"

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go-backend/go.sum

      # npm cache — setup-node is not needed (Node.js is in the container image)
      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      # Moved earlier — only needs checkout
      - uses: google-github-actions/auth@v2
        id: gcp-auth
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: access_token

      # Moved earlier — fast check, only needs GH_TOKEN
      - name: Check if executor code changed (PRs)
        id: executor-changed
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CHANGED=$(gh pr diff ${{ github.event.pull_request.number }} --name-only \
            | grep -qE '^(executor/|pkg/)' && echo true || echo false)
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "Executor code changed: $CHANGED"

      # Run Go build and executor setup as background processes while npm ci
      # runs in the foreground. Playwright browsers are already in the container image.
      - name: "Parallel setup: npm ci (fg), Go build + executor (bg)"
        env:
          GH_TOKEN: ${{ github.token }}
          GCP_ACCESS_TOKEN: ${{ steps.gcp-auth.outputs.access_token }}
          EXECUTOR_CHANGED: ${{ steps.executor-changed.outputs.changed }}
        run: |
          set -euo pipefail

          # --- Go build (background) ---
          (cd go-backend && go build -o ./tmp/server ./cmd/server) &
          GO_PID=$!

          # --- Executor setup (background) ---
          (
            # 1. Wait for executor workflow if running for this commit
            for attempt in 1 2 3; do
              RUN_JSON=$(gh run list --workflow=executor.yaml --commit=${{ github.sha }} \
                --json status,conclusion --jq '.[0] // empty' 2>/dev/null || true)
              if [ -z "$RUN_JSON" ]; then
                echo "[executor] No executor workflow for this commit"
                break
              fi
              STATUS=$(echo "$RUN_JSON" | jq -r '.status')
              if [ "$STATUS" = "completed" ]; then
                echo "[executor] Executor workflow already completed"
                break
              fi
              # Still running — poll until done (executor build-push takes ~3-4 min)
              echo "[executor] Executor workflow in progress, waiting..."
              for i in $(seq 1 40); do
                sleep 15
                STATUS=$(gh run list --workflow=executor.yaml --commit=${{ github.sha }} \
                  --json status --jq '.[0].status // "completed"' 2>/dev/null || echo "completed")
                echo "  [$i] status: $STATUS"
                if [ "$STATUS" = "completed" ]; then
                  echo "[executor] Executor workflow finished"
                  break 2
                fi
              done
              echo "::warning::Timed out waiting for executor workflow — pulling whatever :latest is available"
              break
            done

            # 2. Build from source or pull pre-built image
            if [ "${EXECUTOR_CHANGED}" = "true" ]; then
              echo "[executor] Building executor from source (PR changed executor code)..."
              timeout 300 docker compose up -d executor --build --wait
            else
              echo "[executor] Pulling pre-built executor image..."
              # Authenticate to Artifact Registry using the WIF access token
              # (gcloud is not in the container image)
              echo "$GCP_ACCESS_TOKEN" | docker login -u oauth2accesstoken --password-stdin https://us-east1-docker.pkg.dev 2>/dev/null || true
              if docker pull $EXECUTOR_REGISTRY/executor:latest 2>/dev/null; then
                docker run -d --name eval-executor-1 \
                  -p 8081:8081 --privileged \
                  --tmpfs /tmp:exec,size=256m \
                  -e PORT=8081 -e ENVIRONMENT=local -e LOG_LEVEL=debug \
                  -e NSJAIL_PATH=/usr/bin/nsjail -e PYTHON_PATH=/usr/bin/python3 \
                  -e DEFAULT_TIMEOUT_MS=10000 \
                  $EXECUTOR_REGISTRY/executor:latest
                for i in $(seq 1 30); do
                  curl -sf http://localhost:8081/healthz >/dev/null 2>&1 && break
                  sleep 1
                done
                echo "[executor] Executor running from pre-built image"
              else
                echo "[executor] Pre-built executor not available, will build from source"
              fi
            fi
          ) &
          EXEC_PID=$!

          # --- npm ci (foreground) ---
          cd frontend && npm ci

          # --- Wait for background jobs ---
          FAILED=false
          wait $GO_PID || { echo "::error::Go build failed"; FAILED=true; }
          wait $EXEC_PID || { echo "::error::Executor setup failed"; FAILED=true; }
          if [ "$FAILED" = "true" ]; then exit 1; fi

      - name: Run E2E tests
        env:
          DOCKER_HOST_IP: ${{ steps.host-ip.outputs.ip }}
        run: make test-e2e

      - name: Dump executor logs
        if: failure()
        run: |
          echo "=== Executor container logs ==="
          docker compose logs executor --tail=200 2>/dev/null || true
          # Also check for standalone container from pre-pull step
          docker logs eval-executor-1 --tail=200 2>/dev/null || true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14
