name: Deploy Pipeline

on:
  push:
    branches: [main]

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  REGISTRY: us-east1-docker.pkg.dev/eval-prod-485520/go-api

jobs:
  # ── Inline build-push jobs ────────────────────────────────────────────────
  # Inlined (not via workflow_call) so deploy-staging can depend on them
  # independently of the test workflows. Images tagged with commit SHA.
  # Harmless if tests later fail — never deployed to prod, age out via AR
  # lifecycle policies.

  build-push-go-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - run: gcloud auth configure-docker us-east1-docker.pkg.dev
      - run: |
          docker build -f go-backend/Dockerfile -t $REGISTRY/go-api:${{ github.sha }} .
          docker push $REGISTRY/go-api:${{ github.sha }}

  build-push-executor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - run: gcloud auth configure-docker us-east1-docker.pkg.dev
      - run: |
          docker build -f executor/Dockerfile \
            -t $REGISTRY/executor:${{ github.sha }} \
            -t $REGISTRY/executor:latest \
            .
          docker push $REGISTRY/executor:${{ github.sha }}
          docker push $REGISTRY/executor:latest

  build-push-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - run: gcloud auth configure-docker us-east1-docker.pkg.dev
      - run: |
          docker build -f frontend/Dockerfile -t $REGISTRY/frontend:${{ github.sha }} .
          docker push $REGISTRY/frontend:${{ github.sha }}

  build-push-test-runner:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - run: gcloud auth configure-docker us-east1-docker.pkg.dev
      - run: |
          docker build -f docker/test-runner/Dockerfile \
            --build-arg REGISTRY=$REGISTRY \
            -t $REGISTRY/test-runner:${{ github.sha }} \
            .
          docker push $REGISTRY/test-runner:${{ github.sha }}

  # ── Test workflows (called in parallel, same as before) ───────────────────
  # These run independently of the build-push jobs. deploy-prod gates on all
  # of them passing, but deploy-staging does NOT wait for these.

  go-api:
    uses: ./.github/workflows/go-api.yaml
    secrets: inherit
    permissions:
      contents: read
      id-token: write

  executor:
    uses: ./.github/workflows/executor.yaml
    secrets: inherit
    permissions:
      contents: read
      id-token: write

  frontend:
    uses: ./.github/workflows/frontend-ci.yml
    secrets: inherit
    permissions:
      contents: read
      id-token: write

  # ── Staging deploy (gates only on image availability) ─────────────────────
  # Deploys to staging ASAP after images are pushed, before tests complete.
  # Runs in-cluster test Job to validate the staging deployment.

  deploy-staging:
    needs: [build-push-go-api, build-push-executor, build-push-frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      # setup-gcloud@v2 downloads a full ~500MB SDK even though gcloud is
      # pre-installed on the runner. The runner's apt-managed gcloud disables
      # the component manager and the Google Cloud apt source is removed, so
      # we re-add the source and install the plugin directly (~8s vs ~58s).
      - name: Install gke-gcloud-auth-plugin
        run: |
          curl -fsSL https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" | sudo tee /etc/apt/sources.list.d/google-cloud-sdk.list >/dev/null
          sudo apt-get update -o Dir::Etc::sourcelist="sources.list.d/google-cloud-sdk.list" -o Dir::Etc::sourceparts="-" -o APT::Get::List-Cleanup="0" -qq
          sudo apt-get install -y -qq google-cloud-cli-gke-gcloud-auth-plugin
      - name: Get GKE credentials via Connect Gateway
        run: |
          for i in 1 2 3; do
            gcloud container fleet memberships get-credentials ${{ secrets.GKE_CLUSTER }} \
              --project=eval-prod-485520 && break
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
      - name: Deploy to staging
        run: |
          cd k8s/overlays/staging
          SHA="${{ github.sha }}"
          kustomize edit set image "go-api=$REGISTRY/go-api:$SHA"
          kustomize edit set image "executor=$REGISTRY/executor:$SHA"
          kustomize edit set image "frontend=$REGISTRY/frontend:$SHA"
          kubectl apply -k .
      - name: Wait for staging rollout
        run: |
          kubectl rollout status deployment/go-api -n staging --timeout=120s
          kubectl rollout status deployment/executor -n staging --timeout=120s
          kubectl rollout status deployment/frontend -n staging --timeout=120s
          kubectl rollout status deployment/centrifugo -n staging --timeout=120s
      - name: Run in-cluster staging smoke test
        run: |
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA::7}"

          # Clean up any previous test job
          kubectl delete job -n staging -l app=test-runner --ignore-not-found

          # Create smoke test Job in the staging namespace.
          # Runs inside the cluster so it can resolve staging services by
          # short name (http://frontend, http://go-api) without port-forward.
          #
          # NOTE: Full e2e tests (Playwright) require auth fixtures adapted for
          # real IDP tenants (staging uses real Firebase, not the emulator).
          # Until that's done, this Job runs a service-level smoke test that
          # validates deployment health, API reachability, and basic responses.
          kubectl apply -f - <<JOBEOF
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: staging-test-${SHORT_SHA}
            namespace: staging
            labels:
              app: test-runner
          spec:
            backoffLimit: 0
            activeDeadlineSeconds: 120
            ttlSecondsAfterFinished: 3600
            template:
              metadata:
                labels:
                  app: test-runner
              spec:
                restartPolicy: Never
                containers:
                  - name: smoke
                    image: curlimages/curl:latest
                    command: ["/bin/sh", "-c"]
                    args:
                      - |
                        set -e
                        echo "=== Staging smoke test ==="

                        # 1. Frontend serves HTML
                        echo -n "Frontend... "
                        STATUS=\$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 http://frontend/)
                        if [ "\$STATUS" = "200" ]; then echo "OK (\$STATUS)"; else echo "FAIL (\$STATUS)"; exit 1; fi

                        # 2. Go API health
                        echo -n "Go API /healthz... "
                        STATUS=\$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 http://go-api/healthz)
                        if [ "\$STATUS" = "200" ]; then echo "OK"; else echo "FAIL (\$STATUS)"; exit 1; fi

                        # 3. Go API readiness
                        echo -n "Go API /readyz... "
                        STATUS=\$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 http://go-api/readyz)
                        if [ "\$STATUS" = "200" ]; then echo "OK"; else echo "FAIL (\$STATUS)"; exit 1; fi

                        # 4. Executor health
                        echo -n "Executor /healthz... "
                        STATUS=\$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 http://executor:8081/healthz)
                        if [ "\$STATUS" = "200" ]; then echo "OK"; else echo "FAIL (\$STATUS)"; exit 1; fi

                        # 5. Centrifugo health
                        echo -n "Centrifugo /health... "
                        STATUS=\$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 http://centrifugo:8000/health)
                        if [ "\$STATUS" = "200" ]; then echo "OK"; else echo "FAIL (\$STATUS)"; exit 1; fi

                        # 6. API returns auth error for unauthenticated request (validates middleware runs)
                        echo -n "Go API auth gate... "
                        STATUS=\$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 http://go-api/api/v1/auth/me)
                        if [ "\$STATUS" = "401" ]; then echo "OK (401 as expected)"; else echo "FAIL (\$STATUS, expected 401)"; exit 1; fi

                        echo "=== All staging smoke tests passed ==="
                    resources:
                      requests:
                        cpu: 100m
                        memory: 64Mi
                      limits:
                        cpu: 250m
                        memory: 128Mi
          JOBEOF

          # Wait for Job completion (2 min timeout)
          if ! kubectl wait --for=condition=complete job/staging-test-${SHORT_SHA} -n staging --timeout=120s 2>/dev/null; then
            echo "::error::Staging smoke test failed or timed out"
            kubectl logs job/staging-test-${SHORT_SHA} -n staging --tail=100 || true
            FAILED=$(kubectl get job staging-test-${SHORT_SHA} -n staging -o jsonpath='{.status.failed}' 2>/dev/null || echo "")
            if [ "$FAILED" = "1" ]; then
              echo "Smoke test job failed"
            else
              echo "Smoke test job timed out"
            fi
            exit 1
          fi

          echo "Staging smoke test passed"
          kubectl logs job/staging-test-${SHORT_SHA} -n staging --tail=50

  # ── Production deploy (gates on EVERYTHING) ───────────────────────────────
  # Only runs after staging is validated AND all unit/lint/integration tests pass.

  deploy-prod:
    needs: [deploy-staging, go-api, executor, frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - name: Install gke-gcloud-auth-plugin
        run: |
          curl -fsSL https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" | sudo tee /etc/apt/sources.list.d/google-cloud-sdk.list >/dev/null
          sudo apt-get update -o Dir::Etc::sourcelist="sources.list.d/google-cloud-sdk.list" -o Dir::Etc::sourceparts="-" -o APT::Get::List-Cleanup="0" -qq
          sudo apt-get install -y -qq google-cloud-cli-gke-gcloud-auth-plugin
      - name: Get GKE credentials via Connect Gateway
        run: |
          for i in 1 2 3; do
            gcloud container fleet memberships get-credentials ${{ secrets.GKE_CLUSTER }} \
              --project=eval-prod-485520 && break
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
      - name: Deploy to production
        run: |
          cd k8s/base
          SHA="${{ github.sha }}"
          kustomize edit set image "go-api=$REGISTRY/go-api:$SHA"
          kustomize edit set image "executor=$REGISTRY/executor:$SHA"
          kustomize edit set image "frontend=$REGISTRY/frontend:$SHA"
          kubectl apply -k .
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/go-api --timeout=120s
          kubectl rollout status deployment/executor --timeout=120s
          kubectl rollout status deployment/frontend --timeout=120s
          kubectl rollout status deployment/centrifugo --timeout=120s
      - name: Wait for ingress
        run: |
          # After pods are ready, the GKE NEG (Network Endpoint Group) can
          # take 30-90s to add the new endpoints to the load balancer.
          # Poll through the external URL to confirm traffic is flowing
          # before running smoke tests.
          url="https://eval.delquillan.com/"
          echo "Waiting for ingress to route traffic to new pods..."
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "$url" 2>/dev/null || echo "000")
            if [[ "$code" =~ ^(200|401|403|404)$ ]]; then
              echo "Ingress ready (HTTP $code after $((i * 5))s)"
              exit 0
            fi
            echo "  Attempt ${i}/60: HTTP ${code}, waiting 5s..."
            sleep 5
          done
          echo "::error::Ingress not ready after 300s"
          exit 1
      - name: Smoke test
        run: ./scripts/smoke-test.sh
        env:
          SMOKE_TEST_URL: https://eval.delquillan.com
          GCP_PROJECT_ID: eval-prod-485520

  notify-failure:
    needs: deploy-prod
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = 'Deploy to production failed';
            const sha = context.sha;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `Deploy pipeline failed at commit \`${sha.slice(0, 7)}\`.\n\n[View run](${runUrl})`;

            // Update existing open issue or create a new one.
            const { data: issues } = await github.rest.issues.listForRepo({
              ...context.repo,
              state: 'open',
              labels: 'deploy-failure',
            });
            if (issues.length > 0) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: issues[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                ...context.repo,
                title,
                body,
                labels: ['deploy-failure'],
              });
            }
