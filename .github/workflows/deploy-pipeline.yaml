name: Deploy Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  REGISTRY: us-east1-docker.pkg.dev/eval-prod-485520/go-api
  GO_VERSION: '1.24'

jobs:
  # ── Inline build-push jobs ────────────────────────────────────────────────
  # Inlined (not via workflow_call) so deploy-staging can depend on them
  # independently of the test workflows. Images tagged with commit SHA.
  # Harmless if tests later fail — never deployed to prod, age out via AR
  # lifecycle policies.

  build-push-go-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - run: gcloud auth configure-docker us-east1-docker.pkg.dev
      - run: |
          docker build -f go-backend/Dockerfile -t $REGISTRY/go-api:${{ github.sha }} .
          docker push $REGISTRY/go-api:${{ github.sha }}

  build-push-executor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - run: gcloud auth configure-docker us-east1-docker.pkg.dev
      - name: Compute content hash of executor build inputs
        run: |
          # Hash all files in executor/ (excluding tmp/) and pkg/ — the only
          # repo directories COPYed into the Dockerfile. Truncate to 16 chars.
          HASH=$(find executor/ pkg/ -type f -not -path 'executor/tmp/*' \
            | sort | xargs sha256sum | sha256sum | cut -c1-16)
          echo "CONTENT_HASH=$HASH" >> "$GITHUB_ENV"
          echo "Content hash: $HASH"
      - name: Check for existing content-addressed image
        run: |
          EXISTING=$(gcloud artifacts docker tags list $REGISTRY/executor \
            --filter="tag:content-$CONTENT_HASH" \
            --format="value(tag)" 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            echo "CACHE_HIT=true" >> "$GITHUB_ENV"
            echo "Cache hit: $REGISTRY/executor:content-$CONTENT_HASH already exists"
          else
            echo "CACHE_HIT=false" >> "$GITHUB_ENV"
            echo "Cache miss: building new image"
          fi
      - name: Retag existing image (cache hit)
        if: env.CACHE_HIT == 'true'
        run: |
          # Check if SHA tag already exists (e.g. workflow_dispatch re-run
          # on the same commit). Moving an existing tag requires
          # artifactregistry.tags.delete, which the WIF SA lacks.
          SHA_EXISTS=$(gcloud artifacts docker tags list $REGISTRY/executor \
            --filter="tag:${{ github.sha }}" \
            --format="value(tag)" 2>/dev/null || true)
          if [ -z "$SHA_EXISTS" ]; then
            gcloud artifacts docker tags add \
              $REGISTRY/executor:content-$CONTENT_HASH \
              $REGISTRY/executor:${{ github.sha }}
          else
            echo "SHA tag ${{ github.sha }} already exists, skipping retag"
          fi
      - name: Build and push new image (cache miss)
        if: env.CACHE_HIT == 'false'
        run: |
          docker build -f executor/Dockerfile \
            -t $REGISTRY/executor:content-$CONTENT_HASH \
            -t $REGISTRY/executor:${{ github.sha }} \
            -t $REGISTRY/executor:latest \
            .
          docker push $REGISTRY/executor:content-$CONTENT_HASH
          docker push $REGISTRY/executor:${{ github.sha }}
          docker push $REGISTRY/executor:latest

  build-push-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - run: gcloud auth configure-docker us-east1-docker.pkg.dev
      - run: |
          docker build -f frontend/Dockerfile -t $REGISTRY/frontend:${{ github.sha }} .
          docker push $REGISTRY/frontend:${{ github.sha }}

  # ── CI workflow (single consolidated workflow replacing go-api, executor, frontend) ──
  # Runs all test jobs (with run-all: true, no path filtering). deploy-prod
  # gates on this passing, but deploy-staging does NOT wait for it.

  ci:
    uses: ./.github/workflows/ci.yml
    with:
      run-all: true
    secrets: inherit
    permissions:
      contents: read
      id-token: write

  # ── Staging deploy (gates only on image availability) ─────────────────────
  # Deploys to staging ASAP after images are pushed, before tests complete.
  # Runs Playwright E2E tests against the public staging URL.

  deploy-staging:
    needs: [build-push-go-api, build-push-executor, build-push-frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      # setup-gcloud@v2 downloads a full ~500MB SDK even though gcloud is
      # pre-installed on the runner. The runner's apt-managed gcloud disables
      # the component manager and the Google Cloud apt source is removed, so
      # we re-add the source and install the plugin directly (~8s vs ~58s).
      - name: Install gke-gcloud-auth-plugin
        run: |
          curl -fsSL https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" | sudo tee /etc/apt/sources.list.d/google-cloud-sdk.list >/dev/null
          sudo apt-get update -o Dir::Etc::sourcelist="sources.list.d/google-cloud-sdk.list" -o Dir::Etc::sourceparts="-" -o APT::Get::List-Cleanup="0" -qq
          sudo apt-get install -y -qq google-cloud-cli-gke-gcloud-auth-plugin
      - name: Get GKE credentials via Connect Gateway
        run: |
          for i in 1 2 3; do
            gcloud container fleet memberships get-credentials ${{ secrets.GKE_CLUSTER }} \
              --project=eval-prod-485520 && break
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
      - name: Deploy to staging
        run: |
          cd k8s/overlays/staging
          SHA="${{ github.sha }}"
          kustomize edit set image "go-api=$REGISTRY/go-api:$SHA"
          kustomize edit set image "executor=$REGISTRY/executor:$SHA"
          kustomize edit set image "frontend=$REGISTRY/frontend:$SHA"
          kubectl apply -k .
      - name: Wait for staging rollout
        run: |
          kubectl rollout status deployment/go-api -n staging --timeout=120s
          kubectl rollout status deployment/executor -n staging --timeout=120s
          kubectl rollout status deployment/frontend -n staging --timeout=120s
          kubectl rollout status deployment/centrifugo -n staging --timeout=120s
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
      - name: Restore node_modules cache
        id: node-cache
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
      - name: Install npm dependencies and Playwright
        env:
          PLAYWRIGHT_CACHE_HIT: ${{ steps.playwright-cache.outputs.cache-hit }}
          NODE_CACHE_HIT: ${{ steps.node-cache.outputs.cache-hit }}
        working-directory: frontend
        run: |
          if [ "$NODE_CACHE_HIT" != "true" ]; then
            npm ci
          fi
          if [ "$PLAYWRIGHT_CACHE_HIT" = "true" ]; then
            npx playwright install-deps chromium
          else
            npx playwright install --with-deps chromium
          fi
      - name: Read staging config from ConfigMaps
        run: |
          TENANT_ID=$(kubectl get configmap app-config -n staging -o jsonpath='{.data.FIREBASE_TENANT_ID}')
          API_KEY=$(kubectl get configmap app-config -n staging -o jsonpath='{.data.IDENTITY_PLATFORM_API_KEY}')
          BOOTSTRAP_EMAIL=$(kubectl get configmap app-config -n staging -o jsonpath='{.data.BOOTSTRAP_ADMIN_EMAIL}')
          echo "TENANT_ID=$TENANT_ID" >> "$GITHUB_ENV"
          echo "API_KEY=$API_KEY" >> "$GITHUB_ENV"
          echo "BOOTSTRAP_EMAIL=$BOOTSTRAP_EMAIL" >> "$GITHUB_ENV"
      - name: Apply staging ingress proxy
        run: kubectl apply -f k8s/staging-ingress/
      - name: Wait for staging-ingress-proxy rollout
        run: |
          kubectl rollout status deployment/staging-ingress-proxy --timeout=120s
      - name: Validate executor sandbox (staging)
        run: |
          # Connect Gateway blocks kubectl port-forward (SPDY upgrade), so we
          # use a K8s Job to reach the executor from inside the cluster.
          kubectl delete job -n staging executor-validate --ignore-not-found
          kubectl apply -f - <<'JOBEOF'
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: executor-validate
            namespace: staging
            labels:
              app: executor-validate
          spec:
            backoffLimit: 0
            activeDeadlineSeconds: 120
            ttlSecondsAfterFinished: 600
            template:
              metadata:
                labels:
                  app: executor-validate
              spec:
                restartPolicy: Never
                containers:
                  - name: validate
                    image: curlimages/curl:latest
                    command: ["/bin/sh", "-c"]
                    args:
                      - |
                        set -e
                        echo "=== Waiting for executor ==="
                        for i in $(seq 1 15); do
                          if curl -sf --max-time 3 http://executor.staging.svc.cluster.local:8081/healthz >/dev/null 2>&1; then
                            echo "Executor ready after $((i * 2))s"
                            break
                          fi
                          if [ "$i" = "15" ]; then
                            echo "FAIL: executor not reachable after 30s"
                            exit 1
                          fi
                          sleep 2
                        done

                        echo "=== Python execution test ==="
                        RESULT=$(curl -sf -X POST http://executor.staging.svc.cluster.local:8081/execute \
                          -H 'Content-Type: application/json' \
                          -d '{"code":"print(\"sandbox-ok\")","language":"python"}')
                        echo "$RESULT"
                        echo "$RESULT" | grep -q '"success":true' || { echo "FAIL: Python"; exit 1; }

                        echo "=== Java execution test ==="
                        RESULT=$(curl -sf -X POST http://executor.staging.svc.cluster.local:8081/execute \
                          -H 'Content-Type: application/json' \
                          -d '{"code":"public class Main { public static void main(String[] args) { System.out.println(\"java-ok\"); } }","language":"java","timeout_ms":30000}')
                        echo "$RESULT"
                        echo "$RESULT" | grep -q '"success":true' || { echo "FAIL: Java"; exit 1; }

                        echo "=== Timeout enforcement test ==="
                        RESULT=$(curl -sf -X POST http://executor.staging.svc.cluster.local:8081/execute \
                          -H 'Content-Type: application/json' \
                          -d '{"code":"import time; time.sleep(60)","language":"python","timeout_ms":1000}')
                        echo "$RESULT"
                        echo "$RESULT" | grep -q '"success":false' || { echo "FAIL: Timeout not enforced"; exit 1; }

                        echo "=== All executor sandbox tests passed ==="
                    resources:
                      requests:
                        cpu: 100m
                        memory: 64Mi
                      limits:
                        cpu: 200m
                        memory: 128Mi
          JOBEOF

          echo "Waiting for executor-validate job..."
          DEADLINE=$((SECONDS + 180))
          while [ $SECONDS -lt $DEADLINE ]; do
            SUCCEEDED=$(kubectl get job executor-validate -n staging \
              -o jsonpath='{.status.succeeded}' 2>/dev/null || echo "")
            FAILED=$(kubectl get job executor-validate -n staging \
              -o jsonpath='{.status.failed}' 2>/dev/null || echo "")
            if [ "$SUCCEEDED" = "1" ]; then
              echo "Executor validation passed:"
              kubectl logs job/executor-validate -n staging
              exit 0
            elif [ "$FAILED" = "1" ]; then
              echo "::error::Executor validation failed"
              kubectl logs job/executor-validate -n staging 2>/dev/null || true
              exit 1
            fi
            sleep 5
          done
          echo "::error::Executor validation timed out"
          kubectl logs job/executor-validate -n staging 2>/dev/null || true
          exit 1
      - name: Run staging E2E tests
        env:
          BASE_URL: https://staging.eval.delquillan.com
          API_BASE_URL: https://staging.eval.delquillan.com
          FIREBASE_TENANT_ID: ${{ env.TENANT_ID }}
          FIREBASE_API_KEY: ${{ env.API_KEY }}
          FIREBASE_PROJECT_ID: eval-prod-485520
          BOOTSTRAP_ADMIN_EMAIL: ${{ env.BOOTSTRAP_EMAIL }}
          CI: 'true'
        run: cd frontend && npx playwright test
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-staging
          path: frontend/playwright-report/
          retention-days: 14
      - name: Upload E2E error context
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-error-context-staging
          path: frontend/test-results/**/error-context.md
          retention-days: 14
          if-no-files-found: ignore
      - name: Dump staging logs
        if: failure()
        run: |
          echo "=== go-api logs ==="
          kubectl logs deployment/go-api -n staging --tail=100 2>/dev/null || true
          echo "=== frontend logs ==="
          kubectl logs deployment/frontend -n staging --tail=100 2>/dev/null || true
          echo "=== centrifugo logs ==="
          kubectl logs deployment/centrifugo -n staging --tail=100 2>/dev/null || true

  # ── Production deploy (gates on EVERYTHING) ───────────────────────────────
  # Only runs after staging is validated AND all unit/lint/integration tests pass.

  deploy-prod:
    needs: [deploy-staging, ci]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - name: Install gke-gcloud-auth-plugin
        run: |
          curl -fsSL https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" | sudo tee /etc/apt/sources.list.d/google-cloud-sdk.list >/dev/null
          sudo apt-get update -o Dir::Etc::sourcelist="sources.list.d/google-cloud-sdk.list" -o Dir::Etc::sourceparts="-" -o APT::Get::List-Cleanup="0" -qq
          sudo apt-get install -y -qq google-cloud-cli-gke-gcloud-auth-plugin
      - name: Get GKE credentials via Connect Gateway
        run: |
          for i in 1 2 3; do
            gcloud container fleet memberships get-credentials ${{ secrets.GKE_CLUSTER }} \
              --project=eval-prod-485520 && break
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
      - name: Deploy to production
        run: |
          cd k8s/base
          SHA="${{ github.sha }}"
          kustomize edit set image "go-api=$REGISTRY/go-api:$SHA"
          kustomize edit set image "executor=$REGISTRY/executor:$SHA"
          kustomize edit set image "frontend=$REGISTRY/frontend:$SHA"
          kubectl apply -k .
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/go-api --timeout=120s
          kubectl rollout status deployment/executor --timeout=120s
          kubectl rollout status deployment/frontend --timeout=120s
          kubectl rollout status deployment/centrifugo --timeout=120s
      - name: Wait for ingress
        run: |
          # After pods are ready, the GKE NEG (Network Endpoint Group) can
          # take 30-90s to add the new endpoints to the load balancer.
          # Poll through the external URL to confirm traffic is flowing
          # before running smoke tests.
          url="https://eval.delquillan.com/"
          echo "Waiting for ingress to route traffic to new pods..."
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "$url" 2>/dev/null || echo "000")
            if [[ "$code" =~ ^(200|401|403|404)$ ]]; then
              echo "Ingress ready (HTTP $code after $((i * 5))s)"
              exit 0
            fi
            echo "  Attempt ${i}/60: HTTP ${code}, waiting 5s..."
            sleep 5
          done
          echo "::error::Ingress not ready after 300s"
          exit 1
      - name: Read smoke test credentials
        run: |
          FIREBASE_API_KEY=$(kubectl get configmap frontend-config -o jsonpath='{.data.NEXT_PUBLIC_FIREBASE_API_KEY}')
          SMOKE_TEST_PASSWORD=$(kubectl get secret smoke-test-secrets -o jsonpath='{.data.SMOKE_TEST_PASSWORD}' | base64 -d)
          echo "FIREBASE_API_KEY=$FIREBASE_API_KEY" >> "$GITHUB_ENV"
          echo "::add-mask::$SMOKE_TEST_PASSWORD"
          echo "SMOKE_TEST_PASSWORD=$SMOKE_TEST_PASSWORD" >> "$GITHUB_ENV"
      - name: Smoke test
        run: ./scripts/smoke-test.sh
        env:
          SMOKE_TEST_URL: https://eval.delquillan.com
          GCP_PROJECT_ID: eval-prod-485520
          FIREBASE_API_KEY: ${{ env.FIREBASE_API_KEY }}
          SMOKE_TEST_PASSWORD: ${{ env.SMOKE_TEST_PASSWORD }}

  notify-failure:
    needs: deploy-prod
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = 'Deploy to production failed';
            const sha = context.sha;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `Deploy pipeline failed at commit \`${sha.slice(0, 7)}\`.\n\n[View run](${runUrl})`;

            // Update existing open issue or create a new one.
            const { data: issues } = await github.rest.issues.listForRepo({
              ...context.repo,
              state: 'open',
              labels: 'deploy-failure',
            });
            if (issues.length > 0) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: issues[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                ...context.repo,
                title,
                body,
                labels: ['deploy-failure'],
              });
            }
