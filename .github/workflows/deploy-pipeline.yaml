name: Deploy Pipeline

on:
  push:
    branches: [main]

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  REGISTRY: us-east1-docker.pkg.dev/eval-prod-485520/go-api

jobs:
  go-api:
    uses: ./.github/workflows/go-api.yaml
    secrets: inherit
    permissions:
      contents: read
      id-token: write

  executor:
    uses: ./.github/workflows/executor.yaml
    secrets: inherit
    permissions:
      contents: read
      id-token: write

  frontend:
    uses: ./.github/workflows/frontend-ci.yml
    secrets: inherit
    permissions:
      contents: read
      id-token: write

  deploy:
    needs: [go-api, executor, frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
      - name: Wait for integration tests
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha;
            const workflowFiles = ['e2e-tests.yml', 'contract-tests.yml'];

            for (const file of workflowFiles) {
              const { data: { workflow_runs: runs } } = await github.rest.actions.listWorkflowRuns({
                ...context.repo,
                workflow_id: file,
                head_sha: sha,
              });

              if (runs.length === 0) {
                core.info(`No ${file} run found for ${sha.slice(0, 7)} — skipping`);
                continue;
              }

              const run = runs[0];
              core.info(`Waiting for ${file} run #${run.run_number} (${run.html_url})`);

              let { status, conclusion } = run;
              while (status !== 'completed') {
                await new Promise(r => setTimeout(r, 15000));
                const { data } = await github.rest.actions.getWorkflowRun({
                  ...context.repo,
                  run_id: run.id,
                });
                status = data.status;
                conclusion = data.conclusion;
                core.info(`  ${file}: ${status}${conclusion ? ` (${conclusion})` : ''}`);
              }

              if (conclusion !== 'success') {
                core.setFailed(`${file} ${conclusion} for ${sha.slice(0, 7)}`);
                return;
              }
              core.info(`${file} passed`);
            }
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      # setup-gcloud@v2 downloads a full ~500MB SDK even though gcloud is
      # pre-installed on the runner. The runner's apt-managed gcloud disables
      # the component manager and the Google Cloud apt source is removed, so
      # we re-add the source and install the plugin directly (~8s vs ~58s).
      - name: Install gke-gcloud-auth-plugin
        run: |
          curl -fsSL https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" | sudo tee /etc/apt/sources.list.d/google-cloud-sdk.list >/dev/null
          sudo apt-get update -o Dir::Etc::sourcelist="sources.list.d/google-cloud-sdk.list" -o Dir::Etc::sourceparts="-" -o APT::Get::List-Cleanup="0" -qq
          sudo apt-get install -y -qq google-cloud-cli-gke-gcloud-auth-plugin
      - name: Get GKE credentials via Connect Gateway
        run: |
          for i in 1 2 3; do
            gcloud container fleet memberships get-credentials ${{ secrets.GKE_CLUSTER }} \
              --project=eval-prod-485520 && break
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
      - name: Deploy
        run: |
          cd k8s/base
          SHA="${{ github.sha }}"
          kustomize edit set image "go-api=$REGISTRY/go-api:$SHA"
          kustomize edit set image "executor=$REGISTRY/executor:$SHA"
          kustomize edit set image "frontend=$REGISTRY/frontend:$SHA"
          kubectl apply -k .
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/go-api --timeout=120s
          kubectl rollout status deployment/executor --timeout=120s
          kubectl rollout status deployment/frontend --timeout=120s
          kubectl rollout status deployment/centrifugo --timeout=120s
      - name: Smoke test
        run: ./scripts/smoke-test.sh
        env:
          SMOKE_TEST_URL: https://eval.delquillan.com
          GCP_PROJECT_ID: eval-prod-485520

  notify-failure:
    needs: deploy
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = 'Deploy to production failed';
            const sha = context.sha;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `Deploy pipeline failed at commit \`${sha.slice(0, 7)}\`.\n\n[View run](${runUrl})`;

            // Update existing open issue or create a new one.
            const { data: issues } = await github.rest.issues.listForRepo({
              ...context.repo,
              state: 'open',
              labels: 'deploy-failure',
            });
            if (issues.length > 0) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: issues[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                ...context.repo,
                title,
                body,
                labels: ['deploy-failure'],
              });
            }
