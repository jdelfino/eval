name: CI

on:
  pull_request:
    branches: [main]
  workflow_call:
    inputs:
      run-all:
        description: 'Run all jobs regardless of path changes (used by deploy-pipeline)'
        type: boolean
        default: false

env:
  GO_VERSION: '1.24'
  NODE_VERSION: '20'
  EXECUTOR_REGISTRY: us-east1-docker.pkg.dev/eval-prod-485520/go-api

# ── Path filtering ──────────────────────────────────────────────────────────────
# The changes job detects which parts of the codebase changed. Downstream jobs
# use these outputs to skip themselves when their code hasn't changed.
# When called via workflow_call with run-all: true (deploy-pipeline), all jobs run.

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      go-backend: ${{ inputs.run-all == true || steps.filter.outputs.go-backend }}
      frontend: ${{ inputs.run-all == true || steps.filter.outputs.frontend }}
      executor: ${{ inputs.run-all == true || steps.filter.outputs.executor }}
      k8s: ${{ inputs.run-all == true || steps.filter.outputs.k8s }}
      migrations: ${{ inputs.run-all == true || steps.filter.outputs.migrations }}
      contract-data: ${{ inputs.run-all == true || steps.filter.outputs.contract-data }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        if: inputs.run-all != true
        with:
          filters: |
            go-backend:
              - 'go-backend/**'
              - 'migrations/**'
              - 'scripts/lint-migrations.sh'
              - 'scripts/test-lint-migrations.sh'
            frontend:
              - 'frontend/**'
            executor:
              - 'executor/**'
              - 'pkg/**'
            k8s:
              - 'k8s/**'
            migrations:
              - 'migrations/**'
            contract-data:
              - 'scripts/seed.sql'
              - 'scripts/contract-test-seed.sql'

  # ── Shared build jobs ───────────────────────────────────────────────────────
  # These run once and their outputs (node_modules cache, Go module cache) are
  # consumed by all downstream test jobs. Eliminates duplicate npm ci (5x→1x)
  # and Go module downloads (3x→1x).

  build-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.go-backend == 'true' || needs.changes.outputs.executor == 'true' || needs.changes.outputs.contract-data == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Cache node_modules
        id: node-cache
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
      - name: Install dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: npm ci
        working-directory: frontend

  build-go-api:
    needs: changes
    if: needs.changes.outputs.go-backend == 'true' || needs.changes.outputs.executor == 'true' || needs.changes.outputs.contract-data == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go-backend/go.sum
      - name: Warm Go build cache
        run: go build ./...
        working-directory: go-backend

  # ── Frontend test jobs ──────────────────────────────────────────────────────
  # Each restores node_modules from cache (with npm ci fallback).

  frontend-typecheck:
    needs: [changes, build-frontend]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Restore node_modules cache
        id: node-cache
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
      - name: Install dependencies (cache miss fallback)
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: npm ci
        working-directory: frontend
      - name: Type check
        run: npx tsc --noEmit
        working-directory: frontend

  frontend-test:
    needs: [changes, build-frontend]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Restore node_modules cache
        id: node-cache
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
      - name: Install dependencies (cache miss fallback)
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: npm ci
        working-directory: frontend
      - name: Unit tests
        run: npm test
        working-directory: frontend

  frontend-lint:
    needs: [changes, build-frontend]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Restore node_modules cache
        id: node-cache
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
      - name: Install dependencies (cache miss fallback)
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: npm ci
        working-directory: frontend
      - name: Lint
        run: npm run lint
        working-directory: frontend

  frontend-contract-coverage:
    needs: [changes, build-frontend]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Restore node_modules cache
        id: node-cache
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
      - name: Install dependencies (cache miss fallback)
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: npm ci
        working-directory: frontend
      - name: Check API import boundaries
        run: npx tsx scripts/check-api-imports.ts
        working-directory: frontend
      - name: Check contract test coverage
        run: npx tsx scripts/check-contract-coverage.ts
        working-directory: frontend

  # ── Go API test jobs ────────────────────────────────────────────────────────

  go-api-test:
    needs: [changes, build-go-api]
    if: needs.changes.outputs.go-backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go-backend/go.sum
      - name: Test
        run: go test -v -race -timeout 5m ./...
        working-directory: go-backend

  go-api-lint:
    needs: [changes, build-go-api]
    if: needs.changes.outputs.go-backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go-backend/go.sum
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.8.0
          working-directory: go-backend
          args: --timeout=3m

  go-api-integration:
    needs: [changes, build-go-api]
    if: needs.changes.outputs.go-backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go-backend/go.sum
      - name: Start dependencies
        run: docker compose up -d postgres centrifugo --wait
      - name: Apply migrations
        run: |
          for f in migrations/*.up.sql; do
            psql "postgres://eval:eval_local_password@localhost:5432/eval?sslmode=disable" -f "$f"
          done
      - name: Run integration tests
        env:
          DATABASE_URL: postgres://eval:eval_local_password@localhost:5432/eval?sslmode=disable
          CENTRIFUGO_URL: http://localhost:8000
          CENTRIFUGO_API_KEY: local-api-key
          CENTRIFUGO_TOKEN_SECRET: local-dev-secret-key-not-for-production
        run: go test -v -race -timeout 5m ./...
        working-directory: go-backend
      - name: Stop dependencies
        if: always()
        run: docker compose down

  # ── Executor test jobs ──────────────────────────────────────────────────────
  # NO setup-java (removed in staging-deploy branch).

  executor-test:
    needs: changes
    if: needs.changes.outputs.executor == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: executor/go.sum
      - name: Build
        run: go build ./...
        working-directory: executor
      - name: Test
        run: go test -v -race ./...
        working-directory: executor

  executor-lint:
    needs: changes
    if: needs.changes.outputs.executor == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: executor/go.sum
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.8.0
          working-directory: executor
          args: --timeout=3m

  executor-integration:
    needs: changes
    if: needs.changes.outputs.executor == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: executor/go.sum
      - name: Build executor
        run: go build -o ./tmp/executor ./cmd/executor
        working-directory: executor
      - name: Start executor
        run: |
          executor/tmp/executor &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8081/healthz > /dev/null 2>&1; then break; fi
            sleep 1
          done
          curl -sf http://localhost:8081/healthz || { echo "Executor not ready"; exit 1; }
        env:
          DISABLE_SANDBOX: "true"
          PYTHON_PATH: /usr/bin/python3
      - name: Run integration tests
        env:
          EXECUTOR_TEST_URL: http://localhost:8081
          EXECUTOR_SKIP_SANDBOX_TESTS: "1"
        run: go test -v -race -count=1 ./...
        working-directory: executor

  # ── Cross-stack jobs ────────────────────────────────────────────────────────

  contract-tests:
    needs: [changes, build-frontend, build-go-api]
    if: |
      needs.changes.outputs.go-backend == 'true' ||
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.executor == 'true' ||
      needs.changes.outputs.migrations == 'true' ||
      needs.changes.outputs.contract-data == 'true'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: eval
          POSTGRES_PASSWORD: eval_local_password
          POSTGRES_DB: eval
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U eval"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go-backend/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules cache
        id: node-cache
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install frontend dependencies (cache miss fallback)
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: npm ci
        working-directory: frontend

      - name: Run migrations
        env:
          PGHOST: localhost
          PGPORT: '5432'
          PGUSER: eval
          PGPASSWORD: eval_local_password
          PGDATABASE: eval
        run: |
          for f in migrations/*.up.sql; do
            echo "Applying $f..."
            psql -f "$f"
          done

      - name: Seed contract test data
        env:
          PGHOST: localhost
          PGPORT: '5432'
          PGUSER: eval
          PGPASSWORD: eval_local_password
          PGDATABASE: eval
        run: psql -f scripts/contract-test-seed.sql

      - name: Cache executor Docker image
        id: executor-cache
        uses: actions/cache@v4
        with:
          path: /tmp/executor-image.tar
          key: executor-image-${{ hashFiles('executor/**', 'pkg/**') }}

      - name: Load cached executor image
        if: steps.executor-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/executor-image.tar

      - name: Build executor Docker image
        if: steps.executor-cache.outputs.cache-hit != 'true'
        run: |
          docker build -f executor/Dockerfile -t executor:local .
          docker save executor:local -o /tmp/executor-image.tar

      - name: Start executor
        run: |
          docker run -d --name executor --privileged \
            -p 8081:8081 \
            -e PORT=8081 \
            -e ENVIRONMENT=test \
            -e LOG_LEVEL=info \
            -e DISABLE_SANDBOX=true \
            executor:local
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8081/healthz > /dev/null 2>&1; then
              echo "Executor is ready"
              break
            fi
            sleep 1
          done
          curl -sf http://localhost:8081/healthz > /dev/null 2>&1 || { echo "Executor failed to start"; docker logs executor; exit 1; }

      - name: Start Firebase Auth Emulator
        run: |
          npm install -g firebase-tools
          firebase emulators:start --only auth --project demo-test &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9099/emulator/v1/projects/demo-test/config > /dev/null 2>&1; then
              echo "Firebase Auth Emulator is ready"
              break
            fi
            sleep 1
          done
          curl -sf http://localhost:9099/emulator/v1/projects/demo-test/config > /dev/null 2>&1 || { echo "Firebase Auth Emulator failed to start"; exit 1; }

      - name: Build Go server
        run: go build -o server ./cmd/server
        working-directory: go-backend

      - name: Start Go server
        env:
          FIREBASE_AUTH_EMULATOR_HOST: localhost:9099
          GCP_PROJECT_ID: demo-test
          BOOTSTRAP_ADMIN_EMAIL: emulator-admin@test.local
          DATABASE_HOST: localhost
          DATABASE_PORT: '5432'
          DATABASE_NAME: eval
          DATABASE_USER: eval
          DATABASE_PASSWORD: eval_local_password
          CENTRIFUGO_TOKEN_SECRET: test-contract-secret
          EXECUTOR_URL: http://localhost:8081
        run: |
          PORT=$(shuf -i 10000-60000 -n 1)
          echo "PORT=$PORT" >> "$GITHUB_ENV"
          PORT=$PORT ./server &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
        working-directory: go-backend

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            if curl -sf "http://localhost:$PORT/healthz" > /dev/null 2>&1; then
              echo "Server is ready"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start"
          exit 1

      - name: Run contract tests
        env:
          CONTRACT_NS: contract-${{ github.run_id }}-${{ github.run_attempt }}
          API_BASE_URL: http://localhost:${{ env.PORT }}
          FIREBASE_AUTH_EMULATOR_HOST: localhost:9099
        run: npx jest --selectProjects contract --no-coverage --runInBand
        working-directory: frontend

      - name: Dump executor logs
        if: always()
        run: docker logs executor 2>&1 || true

      - name: Cleanup
        if: always()
        env:
          PGHOST: localhost
          PGPORT: '5432'
          PGUSER: eval
          PGPASSWORD: eval_local_password
          PGDATABASE: eval
        run: |
          psql -c "DELETE FROM namespaces WHERE id = 'contract-${{ github.run_id }}-${{ github.run_attempt }}';"
          docker stop executor 2>/dev/null || true
          docker rm executor 2>/dev/null || true

  e2e-tests:
    needs: [changes, build-frontend, build-go-api]
    if: |
      needs.changes.outputs.go-backend == 'true' ||
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.executor == 'true' ||
      needs.changes.outputs.migrations == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go-backend/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # GCP auth moved early — only needs checkout, enables parallel setup below
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      # Fast check — only needs GH_TOKEN
      - name: Check if executor code changed (PRs)
        id: executor-changed
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CHANGED=$(gh pr diff ${{ github.event.pull_request.number }} --name-only \
            | grep -qE '^(executor/|pkg/)' && echo true || echo false)
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "Executor code changed: $CHANGED"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Restore node_modules cache
        id: node-cache
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      # Run Go build and executor setup as background processes while npm ci
      # and Playwright install run in the foreground (Playwright needs npm ci).
      - name: "Parallel setup: npm ci + Playwright (fg), Go build + executor (bg)"
        env:
          PLAYWRIGHT_CACHE_HIT: ${{ steps.playwright-cache.outputs.cache-hit }}
          EXECUTOR_CHANGED: ${{ steps.executor-changed.outputs.changed }}
          NODE_CACHE_HIT: ${{ steps.node-cache.outputs.cache-hit }}
        run: |
          set -euo pipefail

          # --- Go build (background) ---
          (cd go-backend && go build -o ./tmp/server ./cmd/server) &
          GO_PID=$!

          # --- Executor setup (background) ---
          (
            # When called from deploy-pipeline with run-all: true, the executor image
            # is already being built by the build-push-executor job. For PR-triggered
            # runs, pull :latest or build from source if executor code changed.
            if [ "${EXECUTOR_CHANGED}" = "true" ]; then
              echo "[executor] Building executor from source (PR changed executor code)..."
              timeout 300 docker compose up -d executor --build --wait
            else
              echo "[executor] Pulling pre-built executor image..."
              gcloud auth configure-docker us-east1-docker.pkg.dev --quiet 2>/dev/null || true
              if docker pull $EXECUTOR_REGISTRY/executor:latest 2>/dev/null; then
                docker run -d --name eval-executor-1 \
                  -p 8081:8081 --privileged \
                  --tmpfs /tmp:exec,size=256m \
                  -e PORT=8081 -e ENVIRONMENT=local -e LOG_LEVEL=debug \
                  -e NSJAIL_PATH=/usr/bin/nsjail -e PYTHON_PATH=/usr/bin/python3 \
                  -e DEFAULT_TIMEOUT_MS=10000 \
                  $EXECUTOR_REGISTRY/executor:latest
                for i in $(seq 1 30); do
                  curl -sf http://localhost:8081/healthz >/dev/null 2>&1 && break
                  sleep 1
                done
                echo "[executor] Executor running from pre-built image"
              else
                echo "[executor] Pre-built executor not available, will build from source"
              fi
            fi
          ) &
          EXEC_PID=$!

          # --- npm ci (foreground, needed before Playwright) ---
          if [ "$NODE_CACHE_HIT" != "true" ]; then
            cd frontend && npm ci
          else
            cd frontend
          fi

          # --- Playwright install (foreground, needs npm ci) ---
          if [ "$PLAYWRIGHT_CACHE_HIT" = "true" ]; then
            npx playwright install-deps chromium
          else
            npx playwright install --with-deps chromium
          fi

          # --- Wait for background jobs ---
          FAILED=false
          wait $GO_PID || { echo "::error::Go build failed"; FAILED=true; }
          wait $EXEC_PID || { echo "::error::Executor setup failed"; FAILED=true; }
          if [ "$FAILED" = "true" ]; then exit 1; fi

      - name: Run E2E tests
        run: make test-e2e

      - name: Dump executor logs
        if: failure()
        run: |
          echo "=== Executor container logs ==="
          docker compose logs executor --tail=200 2>/dev/null || true
          # Also check for standalone container from pre-pull step
          docker logs eval-executor-1 --tail=200 2>/dev/null || true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  # ── Infrastructure jobs ─────────────────────────────────────────────────────

  validate-manifests:
    needs: changes
    if: needs.changes.outputs.k8s == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate kustomize build (base)
        run: kustomize build k8s/base > /dev/null
      - name: Validate staging overlay
        run: kustomize build k8s/overlays/staging > /dev/null

  migration-lint:
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.migrations == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for git diff
      - name: Test lint script
        run: bash scripts/test-lint-migrations.sh
      - name: Check for migration-override label
        id: check-label
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            core.setOutput('skip', labels.includes('migration-override'));
      - name: Lint migrations
        if: steps.check-label.outputs.skip != 'true'
        run: |
          # Get migration files changed in this PR
          CHANGED=$(git diff --name-only origin/main...HEAD -- 'migrations/*.up.sql')
          if [ -z "$CHANGED" ]; then
            echo "No migration files changed"
            exit 0
          fi
          echo "Changed migration files:"
          echo "$CHANGED"
          ./scripts/lint-migrations.sh $CHANGED
